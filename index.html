<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>外站票雷達</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<meta name="theme-color" content="#2a78d6">
<style>
:root{
  color-scheme:light;
  --page:#f9f9f7; --surface:#fcfcfb;
  --ink:#0b0b0b; --ink2:#52514e; --muted:#898781;
  --grid:#e1e0d9; --baseline:#c3c2b7; --ring:rgba(11,11,11,.10);
  --accent:#2a78d6; --good:#0ca30c; --good-text:#006300; --critical:#d03b3b;
}
:root[data-theme="dark"]{
  color-scheme:dark;
  --page:#0d0d0d; --surface:#1a1a19;
  --ink:#ffffff; --ink2:#c3c2b7; --muted:#898781;
  --grid:#2c2c2a; --baseline:#383835; --ring:rgba(255,255,255,.10);
  --accent:#3987e5; --good:#0ca30c; --good-text:#0ca30c; --critical:#e66767;
}
@media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]){
    color-scheme:dark;
    --page:#0d0d0d; --surface:#1a1a19;
    --ink:#ffffff; --ink2:#c3c2b7; --muted:#898781;
    --grid:#2c2c2a; --baseline:#383835; --ring:rgba(255,255,255,.10);
    --accent:#3987e5; --good:#0ca30c; --good-text:#0ca30c; --critical:#e66767;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--page);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI","Microsoft JhengHei",sans-serif;line-height:1.5;padding-bottom:40px}
header{position:sticky;top:0;z-index:10;background:var(--page);border-bottom:1px solid var(--grid);padding:10px 14px;display:flex;align-items:center;gap:10px}
header h1{font-size:17px;font-weight:700;flex:1}
header .sub{font-size:11px;color:var(--muted);font-weight:400;display:block}
.iconbtn{border:1px solid var(--ring);background:var(--surface);color:var(--ink2);border-radius:8px;padding:5px 9px;font-size:14px;cursor:pointer}
main{max-width:720px;margin:0 auto;padding:12px}
section{margin-bottom:20px}
h2{font-size:13px;color:var(--ink2);font-weight:600;margin-bottom:8px;letter-spacing:.02em}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.chip{border:1px solid var(--grid);background:var(--surface);color:var(--ink2);border-radius:16px;padding:4px 12px;font-size:13px;cursor:pointer;user-select:none}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.card{background:var(--surface);border:1px solid var(--ring);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.deal{display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit}
.deal .route{flex:1;min-width:0}
.deal .route b{font-size:15px}
.deal .route small{display:block;color:var(--muted);font-size:11.5px}
.deal .price{text-align:right}
.deal .price b{font-size:18px;color:var(--good-text)}
.deal .price small{display:block;color:var(--muted);font-size:11.5px}
.badge{display:inline-block;font-size:10.5px;border-radius:4px;padding:1px 6px;margin-right:4px;color:var(--good-text);border:1px solid var(--good);vertical-align:1px}
.empty{color:var(--muted);font-size:13px;padding:14px;text-align:center}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{color:var(--muted);font-weight:500;text-align:right;padding:5px 6px;border-bottom:1px solid var(--grid);white-space:nowrap}
th:first-child,td:first-child{text-align:left}
td{padding:6px;text-align:right;border-bottom:1px solid var(--grid);font-variant-numeric:tabular-nums;white-space:nowrap}
td .pct{display:block;font-size:10.5px;color:var(--muted)}
td .pct.deal{color:var(--good-text);font-weight:700}
.tblwrap{overflow-x:auto;background:var(--surface);border:1px solid var(--ring);border-radius:12px;padding:4px 8px}
.months{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.mon{background:var(--surface);border:1px solid var(--ring);border-radius:12px;padding:10px}
.mon h3{font-size:12.5px;font-weight:600;margin-bottom:2px}
.mon .min{font-size:11px;color:var(--good-text);margin-bottom:6px}
.dgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.dow{font-size:9.5px;color:var(--muted);text-align:center}
.cell{aspect-ratio:1.15;border-radius:4px;font-size:10px;display:flex;align-items:center;justify-content:center;color:var(--muted);background:transparent;border:1px solid transparent;cursor:pointer}
.cell.has{color:#fff;font-weight:600;border-color:var(--ring)}
.cell.best{outline:2px solid var(--good);outline-offset:1px}
.cell.sel{outline:2px solid var(--ink);outline-offset:1px}
.legend{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);margin:6px 0 10px}
.legend .bar{flex:0 0 120px;height:8px;border-radius:4px;border:1px solid var(--ring)}
#detail{position:fixed;left:0;right:0;bottom:-100%;transition:bottom .2s;background:var(--surface);border-top:1px solid var(--grid);box-shadow:0 -4px 20px rgba(0,0,0,.15);padding:16px;z-index:20;max-width:720px;margin:0 auto;border-radius:14px 14px 0 0}
#detail.show{bottom:0}
#detail .row{display:flex;justify-content:space-between;margin-bottom:4px;font-size:13.5px}
#detail .row span:first-child{color:var(--ink2)}
#detail a{display:block;text-align:center;background:var(--accent);color:#fff;border-radius:9px;padding:10px;margin-top:10px;text-decoration:none;font-weight:600;font-size:14px}
#detail .close{position:absolute;top:8px;right:12px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer}
svg text{fill:var(--muted);font-size:10px;font-variant-numeric:tabular-nums}
.trendwrap{background:var(--surface);border:1px solid var(--ring);border-radius:12px;padding:10px}
.lgd{display:flex;gap:14px;font-size:11.5px;color:var(--ink2);margin-bottom:4px}
.lgd i{display:inline-block;width:14px;height:3px;border-radius:2px;vertical-align:3px;margin-right:4px}
footer{max-width:720px;margin:10px auto;padding:0 14px;font-size:11px;color:var(--muted)}
</style>
</head>
<body>
<header>
  <h1>🛫 外站票雷達<span class="sub" id="scanInfo">載入中…</span></h1>
  <button class="iconbtn" id="themeBtn" title="切換深淺色">🌗</button>
  <button class="iconbtn" onclick="location.reload()" title="重新整理">↻</button>
</header>
<main>
<section id="dealsSec">
  <h2>🔥 好價警示</h2>
  <div class="chips" id="sortChips">
    <span class="chip" data-s="ratio">依價差 %</span>
    <span class="chip" data-s="save">依省最多</span>
    <span class="chip" data-s="price">依價格</span>
    <span class="chip" data-s="date">依出發日</span>
  </div>
  <div id="deals"></div>
</section>

<section>
  <h2>🔍 選擇要細看的航線(以下三個區塊跟著這裡切換)</h2>
  <div class="card" style="padding:10px 12px">
    <div class="chips" id="destChips"></div>
    <div class="chips" style="margin-bottom:0">
      <span class="chip" data-k="cabin" data-v="business">商務艙</span>
      <span class="chip" data-k="cabin" data-v="economy">經濟艙</span>
      <span style="width:8px"></span>
      <span class="chip" data-k="dur" data-v="10">10 天</span>
      <span class="chip" data-k="dur" data-v="16">16 天</span>
    </div>
  </div>
</section>

<section>
  <h2 id="cmpTitle">📊 外站 vs 台北(各月最低價)</h2>
  <div class="tblwrap"><table id="cmpTbl"></table></div>
</section>

<section>
  <h2 id="calTitle">📅 每日最低價月曆</h2>
  <div class="chips" id="originChips"></div>
  <div class="legend"><span>貴</span><div class="bar" id="legendBar"></div><span>便宜</span><span style="margin-left:8px">◎ 當月最低</span></div>
  <div class="months" id="months"></div>
</section>

<section>
  <h2 id="trendTitle">📈 最低價走勢(逐次掃描)</h2>
  <div class="trendwrap">
    <div class="lgd" id="trendLgd"></div>
    <div id="trend"></div>
  </div>
</section>
</main>

<div id="detail">
  <button class="close" onclick="hideDetail()">✕</button>
  <div id="detailBody"></div>
</div>

<footer>
資料來源:Google Flights 月曆最低價(價格為「萬」級近似,以實際查價為準)。掃描由家中電腦手動觸發,本頁顯示最近一次結果。
</footer>

<script>
// ---------- 主題 ----------
const savedTheme = localStorage.getItem('theme');
if (savedTheme) document.documentElement.dataset.theme = savedTheme;
document.getElementById('themeBtn').onclick = () => {
  const cur = document.documentElement.dataset.theme ||
    (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('theme', next);
  render();
};
const isDark = () => (document.documentElement.dataset.theme ||
  (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')) === 'dark';

// ---------- tfs 編碼(與引擎相同邏輯,產生 Google Flights 直達連結) ----------
function varint(n){const o=[];while(n>127){o.push((n&127)|128);n>>>=7}o.push(n);return o}
function lenD(f,b){return[...varint(f<<3|2),...varint(b.length),...b]}
function pstr(f,s){return lenD(f,[...new TextEncoder().encode(s)])}
function pint(f,v){return[...varint(f<<3),...varint(v)]}
const SEAT={economy:1,business:3};
function gfUrl(from,to,dep,ret,cabin){
  const legs=[{d:dep,f:from,t:to},{d:ret,f:to,t:from}];
  const body=[];
  for(const l of legs) body.push(...lenD(3,[...pstr(2,l.d),...lenD(13,pstr(2,l.f)),...lenD(14,pstr(2,l.t))]));
  body.push(...lenD(8,pint(1,1)),...pint(9,SEAT[cabin]||1),...pint(19,1));
  const b64=btoa(String.fromCharCode(...body)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  return `https://www.google.com/travel/flights/search?tfs=${b64}&hl=zh-TW&curr=TWD`;
}

// ---------- 狀態與資料 ----------
const S = { dest:'VIE', cabin:'business', dur:'10', origin:'BKK', dealSort:'ratio', dealsExpanded:false };
let CFG=null, LATEST=null, DEALS=null, TREND=null;
const seqLight=['#cde2fb','#b7d3f6','#9ec5f4','#86b6ef','#6da7ec','#5598e7','#3987e5','#2a78d6','#256abf','#1c5cab','#184f95','#104281','#0d366b'];
const oname=c=>CFG?.originNames?.[c]||c;
const dname=c=>CFG?.destinations?.[c]?.name||c;
const cname=c=>c==='business'?'商務':'經濟';
const fmt=p=>'NT$'+p.toLocaleString();
const wan=p=>'$'+(p/10000).toFixed(p<100000?2:1)+'萬';
const addDays=(iso,n)=>{const d=new Date(iso+'T12:00:00');d.setDate(d.getDate()+n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};
const key=(o)=>[o,S.dest,S.cabin,S.dur].join('|');

async function load(){
  const bust='?t='+Date.now();
  const j=async u=>{try{const r=await fetch(u+bust);return r.ok?await r.json():null}catch{return null}};
  [CFG,LATEST,DEALS,TREND]=await Promise.all([j('config.json'),j('data/latest.json'),j('data/deals.json'),j('data/trend.json')]);
  if(!LATEST){document.getElementById('scanInfo').textContent='尚無資料:請先在電腦執行掃描';return}
  document.getElementById('scanInfo').textContent=`最後掃描 ${LATEST.scanDate}(${new Date(LATEST.scannedAt).toLocaleString('zh-TW',{hour12:false})})`;
  buildStaticChips();
  render();
}

function buildStaticChips(){
  const dc=document.getElementById('destChips');
  dc.innerHTML=Object.keys(CFG.destinations).map(c=>`<span class="chip" data-k="dest" data-v="${c}">${dname(c)}</span>`).join('');
  const oc=document.getElementById('originChips');
  oc.innerHTML=CFG.origins.filter(o=>o!==CFG.baseline).map(c=>`<span class="chip" data-k="origin" data-v="${c}">${oname(c)}</span>`).join('');
  document.querySelectorAll('.chip[data-k]').forEach(ch=>ch.onclick=()=>{S[ch.dataset.k]=ch.dataset.v;render()});
}

// ---------- 渲染 ----------
function render(){
  document.querySelectorAll('.chip[data-k]').forEach(ch=>ch.classList.toggle('on',String(S[ch.dataset.k])===ch.dataset.v));
  const sel=`${dname(S.dest)}・${cname(S.cabin)}艙・${S.dur} 天`;
  document.getElementById('cmpTitle').textContent=`📊 外站 vs 台北:${sel}(各月最低)`;
  document.getElementById('calTitle').textContent=`📅 ${oname(S.origin)}→${sel} 每日最低價`;
  document.getElementById('trendTitle').textContent=`📈 ${oname(S.origin)}→${sel} 最低價走勢`;
  renderDeals();renderCmp();renderCal();renderTrend();
}

const dealSorters={
  ratio:(a,b)=>(a.ratio??9)-(b.ratio??9),
  save:(a,b)=>((b.tpePrice||b.price)-b.price)-((a.tpePrice||a.price)-a.price),
  price:(a,b)=>a.price-b.price,
  date:(a,b)=>a.date.localeCompare(b.date)||(a.ratio??9)-(b.ratio??9),
};
function renderDeals(){
  const el=document.getElementById('deals');
  document.querySelectorAll('#sortChips .chip').forEach(ch=>{
    ch.classList.toggle('on',ch.dataset.s===S.dealSort);
    ch.onclick=()=>{S.dealSort=ch.dataset.s;renderDeals()};
  });
  const ds=[...(DEALS?.deals||[])].sort(dealSorters[S.dealSort]||dealSorters.ratio);
  if(!ds.length){el.innerHTML='<div class="card empty">目前沒有符合條件的好價,持續監控中</div>';return}
  const shown=S.dealsExpanded?ds:ds.slice(0,12);
  el.innerHTML=shown.map(d=>{
    const url=gfUrl(d.from,d.to,d.date,addDays(d.date,d.duration),d.cabin);
    return `<div class="card"><a class="deal" href="${url}" target="_blank" rel="noopener">
      <div class="route"><b>${oname(d.from)} → ${dname(d.to)}</b>
      <small>${cname(d.cabin)}艙 ${d.duration} 天|${d.date} 出發</small>
      <small style="margin-top:2px">${d.triggers.map(t=>`<span class="badge">✓ ${t}</span>`).join('')}</small></div>
      <div class="price"><b>${fmt(d.price)}</b>
      <small>${d.tpePrice?`台北 ${fmt(d.tpePrice)} 的 ${Math.round(d.ratio*100)}%`:'—'}</small>
      ${d.tpePrice?`<small style="color:var(--good-text)">省 ${fmt(d.tpePrice-d.price)}</small>`:''}</div>
    </a></div>`;}).join('')
    +(ds.length>12?`<button class="chip" id="moreDeals" style="display:block;width:100%;padding:8px">${S.dealsExpanded?'收合 ▴':`顯示全部 ${ds.length} 筆 ▾`}</button>`:'');
  const mb=document.getElementById('moreDeals');
  if(mb)mb.onclick=()=>{S.dealsExpanded=!S.dealsExpanded;renderDeals()};
}

function monthlyMin(prices){
  const m={};
  for(const [d,p] of Object.entries(prices||{})){const k=d.slice(0,7);if(!m[k]||p<m[k].p)m[k]={d,p}}
  return m;
}

function renderCmp(){
  const tbl=document.getElementById('cmpTbl');
  const base=monthlyMin(LATEST.matrix[key(CFG.baseline)]);
  const months=new Set(Object.keys(base));
  const rows=[];
  for(const o of CFG.origins){
    const mm=monthlyMin(LATEST.matrix[key(o)]);
    Object.keys(mm).forEach(m=>months.add(m));
    rows.push([o,mm]);
  }
  const ms=[...months].sort();
  if(!ms.length){tbl.innerHTML='<tr><td class="empty">此組合尚未掃描</td></tr>';return}
  let h='<tr><th>出發地</th>'+ms.map(m=>`<th>${Number(m.slice(5))}月</th>`).join('')+'</tr>';
  for(const [o,mm] of rows){
    h+=`<tr><td>${oname(o)}${o===CFG.baseline?' ⭐':''}</td>`+ms.map(m=>{
      const c=mm[m];if(!c)return'<td>—</td>';
      const b=base[m];const r=b&&o!==CFG.baseline?c.p/b.p:null;
      const cls=r!==null&&r<=(CFG.dealRatio||0.8)?'deal':'';
      return `<td>${wan(c.p)}${r!==null?`<span class="pct ${cls}">${Math.round(r*100)}%</span>`:'<span class="pct">基準</span>'}</td>`;
    }).join('')+'</tr>';
  }
  tbl.innerHTML=h;
}

function heatColor(t){ // t: 0=最便宜 1=最貴
  const ramp=isDark()?[...seqLight].reverse():seqLight; // 淺色模式深=便宜;深色模式亮=便宜
  const idx=Math.round((1-t)*(ramp.length-1));
  return ramp[idx];
}

function renderCal(){
  const el=document.getElementById('months');
  const prices=LATEST.matrix[key(S.origin)]||{};
  const base=LATEST.matrix[key(CFG.baseline)]||{};
  const lg=document.getElementById('legendBar');
  lg.style.background=`linear-gradient(to right, ${heatColor(1)}, ${heatColor(0.5)}, ${heatColor(0)})`;
  const entries=Object.entries(prices).sort();
  if(!entries.length){el.innerHTML='<div class="card empty">此組合尚未掃描(引擎可能還在跑,稍後重新整理)</div>';return}
  const vals=entries.map(e=>e[1]);
  const lo=Math.min(...vals),hi=Math.max(...vals);
  const mm=monthlyMin(prices);
  const byMonth={};
  entries.forEach(([d,p])=>{(byMonth[d.slice(0,7)]=byMonth[d.slice(0,7)]||[]).push([d,p])});
  el.innerHTML=Object.keys(byMonth).sort().map(m=>{
    const first=new Date(m+'-01T00:00:00');
    const pad=first.getDay();
    const dim=new Date(first.getFullYear(),first.getMonth()+1,0).getDate();
    const map=Object.fromEntries(byMonth[m]);
    let cells='';
    for(let i=0;i<pad;i++)cells+='<div></div>';
    for(let d=1;d<=dim;d++){
      const dk=`${m}-${String(d).padStart(2,'0')}`;
      const p=map[dk];
      if(p===undefined){cells+=`<div class="cell">${d}</div>`;continue}
      const t=hi>lo?(p-lo)/(hi-lo):0;
      const best=mm[m]&&mm[m].d===dk;
      cells+=`<div class="cell has ${best?'best':''}" style="background:${heatColor(t)}" data-d="${dk}" data-p="${p}">${d}</div>`;
    }
    return `<div class="mon"><h3>${first.getFullYear()} 年 ${first.getMonth()+1} 月</h3>
      <div class="min">${mm[m]?`月最低 ${fmt(mm[m].p)}(${Number(mm[m].d.slice(8))} 日)`:''}</div>
      <div class="dgrid"><div class="dow">日</div><div class="dow">一</div><div class="dow">二</div><div class="dow">三</div><div class="dow">四</div><div class="dow">五</div><div class="dow">六</div>${cells}</div></div>`;
  }).join('');
  el.querySelectorAll('.cell.has').forEach(c=>c.onclick=()=>showDetail(c));
  function showDetail(c){
    el.querySelectorAll('.cell.sel').forEach(x=>x.classList.remove('sel'));
    c.classList.add('sel');
    const d=c.dataset.d,p=Number(c.dataset.p);
    const bp=base[d];
    const url=gfUrl(S.origin,S.dest,d,addDays(d,Number(S.dur)),S.cabin);
    document.getElementById('detailBody').innerHTML=`
      <div class="row"><span>行程</span><b>${oname(S.origin)} → ${dname(S.dest)} ${cname(S.cabin)}艙 ${S.dur} 天</b></div>
      <div class="row"><span>出發</span><b>${d}(回程 ${addDays(d,Number(S.dur))})</b></div>
      <div class="row"><span>最低價</span><b style="color:var(--good-text)">${fmt(p)}</b></div>
      <div class="row"><span>台北同日出發</span><b>${bp?fmt(bp)+`(此價為其 ${Math.round(p/bp*100)}%)`:'無資料'}</b></div>
      <a href="${url}" target="_blank" rel="noopener">在 Google Flights 開啟查證 ↗</a>`;
    document.getElementById('detail').classList.add('show');
  }
}
function hideDetail(){document.getElementById('detail').classList.remove('show')}

function renderTrend(){
  const el=document.getElementById('trend'),lgd=document.getElementById('trendLgd');
  const a=TREND?.[key(S.origin)]||{},b=TREND?.[key(CFG.baseline)]||{};
  const dates=[...new Set([...Object.keys(a),...Object.keys(b)])].sort();
  lgd.innerHTML=`<span><i style="background:var(--accent)"></i>${oname(S.origin)}</span><span><i style="background:var(--baseline)"></i>台北(基準)</span>`;
  if(dates.length<1){el.innerHTML='<div class="empty">尚無走勢資料</div>';return}
  const W=660,H=180,PL=52,PR=10,PT=12,PB=24;
  const vals=[...Object.values(a),...Object.values(b)];
  const lo=Math.min(...vals)*0.95,hi=Math.max(...vals)*1.05;
  const x=i=>PL+(dates.length===1?((W-PL-PR)/2):i*(W-PL-PR)/(dates.length-1));
  const y=v=>PT+(H-PT-PB)*(1-(v-lo)/(hi-lo));
  const line=(o,color,dash)=>{
    const pts=dates.map((d,i)=>o[d]!==undefined?[x(i),y(o[d]),d,o[d]]:null).filter(Boolean);
    if(!pts.length)return'';
    return `<polyline fill="none" stroke="${color}" stroke-width="2" ${dash?'stroke-dasharray="4 3"':''} points="${pts.map(p=>p[0]+','+p[1]).join(' ')}"/>`+
      pts.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="4" fill="${color}"><title>${p[2]} ${fmt(p[3])}</title></circle>`).join('');
  };
  const ticks=[lo+(hi-lo)*0.1,(lo+hi)/2,hi-(hi-lo)*0.1].map(v=>`<text x="${PL-6}" y="${y(v)+3}" text-anchor="end">${wan(v)}</text><line x1="${PL}" x2="${W-PR}" y1="${y(v)}" y2="${y(v)}" stroke="var(--grid)" stroke-width="1"/>`).join('');
  const xlabels=dates.map((d,i)=>(dates.length<=8||i%Math.ceil(dates.length/8)===0)?`<text x="${x(i)}" y="${H-6}" text-anchor="middle">${d.slice(5)}</text>`:'').join('');
  el.innerHTML=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${ticks}${xlabels}
    ${line(b,'var(--baseline)',true)}${line(a,'var(--accent)',false)}</svg>`;
}

// ---------- PWA ----------
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
load();
</script>
</body>
